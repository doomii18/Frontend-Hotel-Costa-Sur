<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador — Hotel Costa Sur</title>
  <meta name="description" content="Panel de administración exclusivo para el personal del Hotel Costa Sur.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/admin.css">
</head>

<body>

  <!-- ══ BARRA SUPERIOR ══════════════════════════════════════════ -->
  <header class="adm-header">
    <div class="adm-header__brand">
      <img src="IMG/LOGO.jpeg" alt="Hotel Costa Sur" class="adm-header__logo">
    
    </div>

    <div class="adm-header__actions">
      <span class="adm-header__admin-tag"> HCS-ADMINISTRADOR</span>
      <button class="adm-header__btn adm-header__btn--home" id="adminHomeBtn">
        <i class="fas fa-home"></i> Ver web
      </button>
      <button class="adm-header__btn adm-header__btn--logout" id="adminLogoutBtn">
        <i class="fas fa-sign-out-alt"></i> Cerrar sesión
      </button>
    </div>
  </header>

  <!-- ══ CONTENIDO PRINCIPAL ═════════════════════════════════════ -->
  <main class="adm-layout">
    <div id="adminRoot"></div>
  </main>

  <script src="JS/data.js"></script>
  <script src="JS/admin.js"></script>

</body>
</html>
